<div class="image-box">
     <img src="{{ site.baseurl }}/assets/images/{{ include.name }}"
     alt="{{ include.alt | default: ''}}"
     {% if include.class %}class="{{ include.class | default: 'one-image' }}"{% endif %}
     {% if include.width %}width="{{ include.width }}"{% endif %}
     {% if include.height %}height="{{ include.height }}"{% endif %} />
</div>
