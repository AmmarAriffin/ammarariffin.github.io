---
layout: default
---

<div>
    <div style="padding: 1em">
        <h1>{{ page.title }} </h1>
        {{ content }}
    </div>
    <div class="border">
        <h2>References</h2>
        {% if page.reference %}
            {% bibliography --cited_in_order --file {{ page.reference }} %}
        {% endif %}
    </div>
</div>
